<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRE Copilot | Enterprise Control Center</title>
</head>
<body class="font-body h-screen flex overflow-hidden" style="background:#FAFAFA; color:#121212;">

    <!-- Sidebar Navigation -->
    <nav style="width:220px; flex-shrink:0; height:100%; display:flex; flex-direction:column; background:#FFFFFF; border-right:1px solid #E6E6E6; z-index:20; overflow:hidden;">
        <!-- Rendered by Sidebar.js -->
    </nav>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow flex flex-col min-w-0 relative">

        <!-- Top Header -->
        <header style="height:56px; flex-shrink:0; background:#FFFFFF; border-bottom:1px solid #E6E6E6; box-shadow:0 1px 4px rgba(0,0,0,0.04); display:flex; align-items:center; padding:0 24px; justify-content:space-between; position:sticky; top:0; z-index:10;">
            <!-- Rendered by Header.js -->
        </header>

        <!-- Dynamic Content -->
        <div id="main-view" class="flex-grow p-6 overflow-y-auto min-h-0">
            <!-- Loading state -->
            <div id="loading-overlay" class="flex flex-col items-center justify-center h-full gap-3">
                <div style="width:36px; height:36px; border-radius:50%; border:3px solid #D2E0FE; border-top-color:#134AC1;" class="animate-spin"></div>
                <div style="font-size:12px; font-weight:600; color:#666666; letter-spacing:0.06em; text-transform:uppercase;">Initializing...</div>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
