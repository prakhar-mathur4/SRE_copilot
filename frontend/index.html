<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRE Copilot | Enterprise Control Center</title>
</head>
<body class="bg-background-light text-text-light dark:bg-background-dark dark:text-text-dark font-body h-screen flex overflow-hidden transition-colors duration-300">
    
    <!-- Sidebar Navigation -->
    <nav class="w-[80px] h-full flex flex-col items-center py-6 bg-surface-light dark:bg-surface-dark border-r border-surface-hover-light dark:border-surface-hover-dark shrink-0 z-20">
        <!-- Rendered by Sidebar.js -->
    </nav>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow flex flex-col min-w-0 relative">
        <!-- Dashboard Header -->
        <header class="h-[72px] border-b border-surface-hover-light dark:border-surface-hover-dark flex items-center px-8 justify-between bg-surface-light/80 dark:bg-surface-dark/80 backdrop-blur-xl sticky top-0 z-10">
            <!-- Rendered by Header.js -->
        </header>

        <!-- Dynamic Content -->
        <div id="main-view" class="flex-grow p-6 overflow-y-auto min-h-0">
            <!-- Loading State -->
            <div id="loading-overlay" class="flex flex-col items-center justify-center h-full gap-4">
                <div class="w-12 h-12 border-4 border-primary-light/20 border-t-primary-light rounded-full animate-spin"></div>
                <div class="text-primary-light font-heading font-bold uppercase tracking-widest text-xs animate-pulse">Initializing Neural Link...</div>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
