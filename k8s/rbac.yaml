apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-copilot-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-copilot-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "deployments", "nodes"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-copilot-binding
subjects:
  - kind: ServiceAccount
    name: sre-copilot-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: sre-copilot-role
  apiGroup: rbac.authorization.k8s.io
